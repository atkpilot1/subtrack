<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SubTrack — Subscription Tracker</title>
<meta name="description" content="Track all your subscriptions, see your monthly and yearly costs, and never get surprised by a bill again." />
<meta name="theme-color" content="#0d0d1a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SubTrack" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SubTrack" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d1a;
    --surface: #13131f;
    --surface2: #1a1a2e;
    --surface3: #20203a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0eeff;
    --text2: #9993bb;
    --text3: #5a5478;
    --accent: #7c6fff;
    --accent2: #a594ff;
    --accent-bg: rgba(124,111,255,0.12);
    --red: #ff6b6b;
    --red-bg: rgba(255,107,107,0.12);
    --green: #4ecdc4;
    --green-bg: rgba(78,205,196,0.12);
    --yellow: #ffd93d;
    --yellow-bg: rgba(255,217,61,0.1);
    --radius: 14px;
    --radius-sm: 9px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 5rem;
  }

  header {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  .logo { display: flex; align-items: baseline; gap: 8px; }
  .logo-mark {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: -0.5px;
  }
  .logo-sub { font-size: 11px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; }

  .container { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 12px; }

  /* Summary cards */
  .summary-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
  }
  .summary-card.featured { border-color: var(--accent); background: var(--accent-bg); }
  .summary-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
  .summary-card.featured .summary-label { color: var(--accent2); opacity: 0.8; }
  .summary-value {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .summary-card.featured .summary-value { color: var(--accent2); }
  .summary-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* Add form */
  .add-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }
  .add-card-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
  }
  .form-row { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .input-wrap {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    transition: border-color 0.15s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  .input-wrap input, .input-wrap select {
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    color: var(--text);
    padding: 10px 0;
    width: 100%;
    min-width: 0;
  }
  .input-wrap input::placeholder { color: var(--text3); }
  .input-wrap select option { background: var(--surface2); color: var(--text); }
  .input-prefix { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text3); margin-right: 4px; }
  .add-btn {
    padding: 10px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s;
  }
  .add-btn:hover { background: var(--accent2); }

  /* Category quick picks */
  .quick-picks { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .quick-btn {
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text2);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.1s;
  }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

  /* Subscription list */
  .list-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .list-title { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); }
  .list-sort {
    display: flex;
    gap: 4px;
  }
  .sort-btn {
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text3);
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .sort-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

  .sub-item {
    display: flex;
    align-items: center;
    padding: 14px 1.25rem;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background 0.1s;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .sub-item:last-child { border-bottom: none; }
  .sub-item:hover { background: var(--surface2); }
  .sub-emoji {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--surface3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .sub-info { flex: 1; min-width: 0; }
  .sub-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sub-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .sub-renewal { font-size: 11px; margin-top: 2px; }
  .sub-renewal.soon { color: var(--yellow); }
  .sub-renewal.overdue { color: var(--red); }
  .sub-renewal.ok { color: var(--text3); }
  .sub-price {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    text-align: right;
    flex-shrink: 0;
  }
  .sub-price-mo { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .sub-delete {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.1s;
    flex-shrink: 0;
  }
  .sub-delete:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

  .empty-state {
    padding: 3rem 1.25rem;
    text-align: center;
    color: var(--text3);
    font-size: 13px;
    line-height: 1.7;
  }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }

  /* Breakdown */
  .breakdown-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }
  .breakdown-title { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
  .breakdown-bar { margin-bottom: 10px; }
  .breakdown-bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
  .breakdown-bar-label span:first-child { color: var(--text2); }
  .breakdown-bar-label span:last-child { font-family: 'DM Mono', monospace; color: var(--text); }
  .bar-track { height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

  /* Reminder notice */
  .reminder-card {
    background: var(--yellow-bg);
    border: 1px solid rgba(255,217,61,0.2);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    display: none;
  }
  .reminder-title { font-size: 12px; font-weight: 600; color: var(--yellow); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .reminder-item { font-size: 13px; color: var(--text2); padding: 3px 0; }

  footer { margin-top: 2.5rem; font-size: 11px; color: var(--text3); letter-spacing: 0.06em; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-mark">SUB/</span>
    <span class="logo-sub">Tracker</span>
  </div>
  <span style="font-size:11px;color:var(--text3);" id="subCount">0 subscriptions</span>
</header>

<div class="container">

  <!-- Summary -->
  <div class="summary-grid">
    <div class="summary-card featured">
      <div class="summary-label">Monthly</div>
      <div class="summary-value" id="totalMonthly">$0</div>
      <div class="summary-sub">per month</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Yearly</div>
      <div class="summary-value" id="totalYearly">$0</div>
      <div class="summary-sub">per year</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Daily</div>
      <div class="summary-value" id="totalDaily">$0</div>
      <div class="summary-sub">per day</div>
    </div>
  </div>

  <!-- Upcoming renewals -->
  <div class="reminder-card" id="reminderCard">
    <div class="reminder-title">Upcoming renewals</div>
    <div id="reminderList"></div>
  </div>

  <!-- Add subscription -->
  <div class="add-card">
    <div class="add-card-title">Add subscription</div>
    <div class="quick-picks" id="quickPicks">
      <button class="quick-btn" data-name="Netflix" data-emoji="📺" data-price="15.49">Netflix</button>
      <button class="quick-btn" data-name="Spotify" data-emoji="🎵" data-price="10.99">Spotify</button>
      <button class="quick-btn" data-name="Hulu" data-emoji="📱" data-price="7.99">Hulu</button>
      <button class="quick-btn" data-name="Disney+" data-emoji="🏰" data-price="13.99">Disney+</button>
      <button class="quick-btn" data-name="Apple TV+" data-emoji="🍎" data-price="9.99">Apple TV+</button>
      <button class="quick-btn" data-name="Amazon Prime" data-emoji="📦" data-price="14.99">Amazon Prime</button>
      <button class="quick-btn" data-name="YouTube Premium" data-emoji="▶️" data-price="13.99">YouTube</button>
      <button class="quick-btn" data-name="HBO Max" data-emoji="🎬" data-price="15.99">HBO Max</button>
      <button class="quick-btn" data-name="iCloud" data-emoji="☁️" data-price="2.99">iCloud</button>
      <button class="quick-btn" data-name="ChatGPT Plus" data-emoji="🤖" data-price="20.00">ChatGPT</button>
    </div>
    <div class="form-row">
      <div class="input-wrap">
        <input type="text" id="subName" placeholder="Subscription name" maxlength="30" />
      </div>
      <div class="input-wrap" style="width:110px;">
        <span class="input-prefix">$</span>
        <input type="number" id="subPrice" placeholder="0.00" min="0" step="0.01" style="width:70px;" />
      </div>
      <button class="add-btn" id="addBtn">Add</button>
    </div>
    <div class="form-row-2">
      <div class="input-wrap">
        <select id="subCycle">
          <option value="monthly">Monthly</option>
          <option value="yearly">Yearly</option>
          <option value="weekly">Weekly</option>
        </select>
      </div>
      <div class="input-wrap">
        <input type="date" id="subRenewal" />
      </div>
    </div>
  </div>

  <!-- List -->
  <div class="list-card">
    <div class="list-header">
      <span class="list-title">Your subscriptions</span>
      <div class="list-sort">
        <button class="sort-btn active" data-sort="date">Recent</button>
        <button class="sort-btn" data-sort="price">Price</button>
        <button class="sort-btn" data-sort="name">Name</button>
      </div>
    </div>
    <div id="subList">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        Add your first subscription above<br>to start tracking your spending
      </div>
    </div>
  </div>

  <!-- Breakdown -->
  <div class="breakdown-card" id="breakdownCard" style="display:none;">
    <div class="breakdown-title">Spending breakdown</div>
    <div id="breakdownBars"></div>
  </div>

</div>

<footer>SubTrack — know what you're paying</footer>

<script>
  const EMOJIS = {
    default: '💳',
    stream: '📺',
    music: '🎵',
    cloud: '☁️',
    news: '📰',
    fitness: '💪',
    gaming: '🎮',
    software: '💻',
    food: '🍔',
    other: '📦'
  };

  const BAR_COLORS = ['#7c6fff','#4ecdc4','#ffd93d','#ff6b6b','#a594ff','#6bcfff','#ff9f43','#55efc4'];

  let subs = JSON.parse(localStorage.getItem('subtrack-subs') || '[]');
  let sortMode = 'date';

  function save() {
    localStorage.setItem('subtrack-subs', JSON.stringify(subs));
  }

  function toMonthly(price, cycle) {
    if (cycle === 'yearly') return price / 12;
    if (cycle === 'weekly') return price * 4.33;
    return price;
  }

  function fmt(n) { return '$' + n.toFixed(2); }
  function fmtShort(n) {
    if (n >= 1000) return '$' + (n/1000).toFixed(1) + 'k';
    return '$' + Math.round(n);
  }

  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dateStr); d.setHours(0,0,0,0);
    return Math.round((d - today) / 86400000);
  }

  function renewalLabel(dateStr) {
    const days = daysUntil(dateStr);
    if (days === null) return { text: '', cls: 'ok' };
    if (days < 0) return { text: `Renewed ${Math.abs(days)}d ago`, cls: 'ok' };
    if (days === 0) return { text: 'Renews today!', cls: 'overdue' };
    if (days <= 3) return { text: `Renews in ${days}d`, cls: 'overdue' };
    if (days <= 7) return { text: `Renews in ${days}d`, cls: 'soon' };
    const d = new Date(dateStr);
    return { text: `Renews ${d.toLocaleDateString('en-US', {month:'short', day:'numeric'})}`, cls: 'ok' };
  }

  function getEmoji(sub) {
    return sub.emoji || EMOJIS.default;
  }

  function render() {
    const monthly = subs.reduce((s, x) => s + toMonthly(x.price, x.cycle), 0);
    const yearly = monthly * 12;
    const daily = monthly / 30.4;

    document.getElementById('totalMonthly').textContent = fmtShort(monthly);
    document.getElementById('totalYearly').textContent = fmtShort(yearly);
    document.getElementById('totalDaily').textContent = '$' + daily.toFixed(2);
    document.getElementById('subCount').textContent = subs.length + ' subscription' + (subs.length !== 1 ? 's' : '');

    // Reminders
    const soon = subs.filter(s => { const d = daysUntil(s.renewal); return d !== null && d >= 0 && d <= 7; });
    const reminderCard = document.getElementById('reminderCard');
    if (soon.length > 0) {
      reminderCard.style.display = '';
      document.getElementById('reminderList').innerHTML = soon.map(s => {
        const d = daysUntil(s.renewal);
        return `<div class="reminder-item">${getEmoji(s)} ${s.name} — ${d === 0 ? 'today' : 'in ' + d + ' day' + (d !== 1 ? 's' : '')} (${fmt(s.price)})</div>`;
      }).join('');
    } else {
      reminderCard.style.display = 'none';
    }

    // Sort
    let sorted = [...subs];
    if (sortMode === 'price') sorted.sort((a,b) => toMonthly(b.price, b.cycle) - toMonthly(a.price, a.cycle));
    else if (sortMode === 'name') sorted.sort((a,b) => a.name.localeCompare(b.name));
    else sorted.reverse();

    // List
    const listEl = document.getElementById('subList');
    if (subs.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>Add your first subscription above<br>to start tracking your spending</div>`;
    } else {
      listEl.innerHTML = sorted.map(sub => {
        const mo = toMonthly(sub.price, sub.cycle);
        const rl = renewalLabel(sub.renewal);
        const cycleLabel = sub.cycle === 'yearly' ? '/yr' : sub.cycle === 'weekly' ? '/wk' : '/mo';
        return `<div class="sub-item">
          <div class="sub-emoji">${getEmoji(sub)}</div>
          <div class="sub-info">
            <div class="sub-name">${sub.name}</div>
            <div class="sub-meta">${sub.cycle.charAt(0).toUpperCase() + sub.cycle.slice(1)}</div>
            ${rl.text ? `<div class="sub-renewal ${rl.cls}">${rl.text}</div>` : ''}
          </div>
          <div>
            <div class="sub-price">${fmt(sub.price)}${cycleLabel}</div>
            ${sub.cycle !== 'monthly' ? `<div class="sub-price-mo">${fmt(mo)}/mo</div>` : ''}
          </div>
          <button class="sub-delete" onclick="deleteSub('${sub.id}')">×</button>
        </div>`;
      }).join('');
    }

    // Breakdown
    const breakdownCard = document.getElementById('breakdownCard');
    if (subs.length > 1) {
      breakdownCard.style.display = '';
      const top = [...subs].sort((a,b) => toMonthly(b.price,b.cycle) - toMonthly(a.price,a.cycle)).slice(0, 6);
      document.getElementById('breakdownBars').innerHTML = top.map((sub, i) => {
        const mo = toMonthly(sub.price, sub.cycle);
        const pct = monthly > 0 ? (mo / monthly * 100) : 0;
        return `<div class="breakdown-bar">
          <div class="breakdown-bar-label">
            <span>${getEmoji(sub)} ${sub.name}</span>
            <span>${fmt(mo)}/mo</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${BAR_COLORS[i % BAR_COLORS.length]};"></div>
          </div>
        </div>`;
      }).join('');
    } else {
      breakdownCard.style.display = 'none';
    }
  }

  function addSub(name, price, cycle, renewal, emoji) {
    if (!name || !price || price <= 0) return;
    subs.push({
      id: Date.now().toString(),
      name,
      price: parseFloat(price),
      cycle: cycle || 'monthly',
      renewal: renewal || '',
      emoji: emoji || EMOJIS.default,
      added: Date.now()
    });
    save();
    render();
  }

  window.deleteSub = function(id) {
    subs = subs.filter(s => s.id !== id);
    save();
    render();
  };

  document.getElementById('addBtn').addEventListener('click', () => {
    const name = document.getElementById('subName').value.trim();
    const price = document.getElementById('subPrice').value;
    const cycle = document.getElementById('subCycle').value;
    const renewal = document.getElementById('subRenewal').value;
    if (!name || !price) return;
    addSub(name, price, cycle, renewal, EMOJIS.default);
    document.getElementById('subName').value = '';
    document.getElementById('subPrice').value = '';
    document.getElementById('subRenewal').value = '';
  });

  document.getElementById('subName').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('addBtn').click();
  });

  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.name;
      const price = btn.dataset.price;
      const emoji = btn.dataset.emoji;
      addSub(name, price, 'monthly', '', emoji);
    });
  });

  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      sortMode = btn.dataset.sort;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // Set default renewal date to 1 month from now
  const d = new Date(); d.setMonth(d.getMonth() + 1);
  document.getElementById('subRenewal').value = d.toISOString().split('T')[0];

  render();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js');
    });
  }
</script>
</body>
</html>
